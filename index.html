<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard">
    <!-- Header Section -->
    <header class="header">
      <h1>Welcome to Your Dashboard</h1>
      <p>Your one-stop location for everything important.</p>
    </header>

    <!-- Content Section -->
    <main class="content">
      <!-- Tile 1 -->
      <div class="tile">
        <div class="tile-header">
          <h2>Current Time</h2>
        </div>
        <div class="tile-body">
          <p id="event">Current Time: Loading...</p>
        </div>
      </div>

      <!-- Tile 2 -->
      <div class="tile">
        <div class="tile-header">
          <h2>Weather</h2>
        </div>
        <div class="tile-body">
          <p id="weather">Loading weather...</p>
        </div>
      </div>

      <!-- Tile 3 -->
      <div class="tile">
        <div class="tile-header">
          <h2>Quick Actions</h2>
        </div>
        <div class="tile-body">
          <button>Click Me</button>
        </div>
      </div>
    </main>

    <!-- Footer Section -->
    <footer class="footer">
      <p>© 2024 NAME0x0. All rights reserved.</p>
    </footer>
  </div>

  <!-- JavaScript File -->
  <script src="script.js"></script>
</body>
</html>
