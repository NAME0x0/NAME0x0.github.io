<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA | Personal AI Dashboard</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div id="ava-container">
        <!-- Background Elements -->
        <div class="matrix-bg"></div>
        <div class="grid-overlay"></div>
        <div class="scan-line"></div>

        <!-- AI Assistant Interface -->
        <div class="ai-interface">
            <div class="ai-core">
                <div class="ai-visualization"></div>
                <div class="ai-status">
                    <div class="status-indicator active"></div>
                    <span class="status-text">AVA Active - Ready to assist</span>
                </div>
            </div>
            <div class="ai-interaction">
                <div class="chat-history"></div>
                <div class="input-area">
                    <input type="text" class="ai-input" placeholder="Ask me anything..." autofocus>
                    <button class="voice-trigger" title="Voice Command">
                        <div class="voice-indicator"></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Quick Access -->
            <div class="widget" data-widget="quick-access">
                <div class="widget-header">
                    <span>Quick Access</span>
                    <div class="widget-controls"></div>
                </div>
                <div class="widget-content">
                    <div class="quick-links"></div>
                    <div class="recent-items"></div>
                </div>
            </div>

            <!-- Smart Search -->
            <div class="widget" data-widget="smart-search">
                <!-- Smart search widget content -->
            </div>

            <!-- Task Management -->
            <div class="widget" data-widget="tasks">
                <!-- Task management widget content -->
            </div>

            <!-- System Monitor -->
            <div class="widget" data-widget="system">
                <!-- System monitoring widget content -->
            </div>

            <!-- Weather & Time -->
            <div class="widget" data-widget="weather-time"></div>
                <!-- Weather and time widget content -->
            </div>

            <!-- Notes & Reminders -->
            <div class="widget" data-widget="notes">
                <!-- Notes widget content -->
            </div>
        </div>

        <!-- Command Center -->
        <div class="command-center">
            <div class="terminal-toggle" title="Toggle Terminal">
                <span class="icon">⌘</span>
            </div>
            <div class="terminal-container collapsed">
                <!-- Terminal content -->
            </div>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="js/ava-core.js"></script>
    <script src="js/widgets.js"></script>
    <script src="js/animations.js"></script>
</body>
</html>
