<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA | Personal AI Dashboard</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/three-dots@0.3.2/dist/three-dots.min.css">
</head>
<body>
    <!-- Preloader for smooth initialization -->
    <div id="preloader" class="preloader">
        <div class="loader">
            <div class="cyber-spinner"></div>
            <div class="loading-text">Initializing AVA Core</div>
        </div>
    </div>

    <div id="ava-container" class="hidden">
        <!-- Enhanced Background Elements -->
        <div class="matrix-rain"></div>
        <div class="grid-overlay"></div>
        <div class="scan-line"></div>
        <div class="noise-overlay"></div>
        
        <!-- Holographic Interface -->
        <div class="holo-interface">
            <!-- Central AI Core Visualization -->
            <div class="ai-core">
                <div class="core-visualization">
                    <canvas id="core-canvas"></canvas>
                    <div class="core-stats">
                        <div class="stat-ring cpu"></div>
                        <div class="stat-ring memory"></div>
                        <div class="stat-ring network"></div>
                    </div>
                </div>
                <div class="ai-status">
                    <div class="status-indicator pulse"></div>
                    <div class="status-details">
                        <span class="status-text">AVA Core Online</span>
                        <span class="version">v1.0.0</span>
                    </div>
                </div>
            </div>

            <!-- Main Dashboard -->
            <div class="dashboard">
                <!-- Quick Actions Bar -->
                <nav class="quick-actions">
                    <button class="action-btn" data-action="search">
                        <i class="icon-search"></i>
                        <span>Global Search</span>
                    </button>
                    <!-- ... other quick actions ... -->
                </nav>

                <!-- Widget Grid -->
                <div class="widget-grid">
                    <!-- Widget containers will be dynamically populated -->
                </div>
            </div>

            <!-- Enhanced Command Interface -->
            <div class="command-interface">
                <div class="command-bar">
                    <span class="prompt">ava://$</span>
                    <input type="text" class="command-input" 
                           placeholder="Enter command or ask anything..."
                           autocomplete="off"
                           spellcheck="false">
                    <button class="voice-trigger" title="Activate voice command">
                        <div class="voice-indicator"></div>
                    </button>
                </div>
                <div class="suggestions-panel hidden">
                    <!-- Dynamic command suggestions -->
                </div>
            </div>
        </div>

        <!-- Context Menu -->
        <div class="context-menu hidden">
            <!-- Dynamic context menu items -->
        </div>

        <!-- Toast Notifications -->
        <div class="toast-container">
            <!-- Dynamic notifications -->
        </div>

        <!-- Keyboard Shortcuts Guide -->
        <div class="shortcuts-overlay hidden">
            <!-- Keyboard shortcuts help -->
        </div>
    </div>

    <!-- Error Boundary -->
    <div id="error-boundary" class="hidden">
        <div class="error-content">
            <h2>System Error Detected</h2>
            <p class="error-message"></p>
            <button class="restart-btn">Restart AVA</button>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="js/lib/three.min.js"></script>
    <script src="js/lib/particles.min.js"></script>
    <script src="js/ava-core.js"></script>
    <script src="js/widgets.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/error-boundary.js"></script>
</body>
</html>
