<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA AI Assistant</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <div id="particles-js" class="matrix-bg"></div>
    <div class="dynamic-overlay"></div>
    
    <div class="ai-presence">
        <div class="loader-container">
            <div class="circle-loader">
                <div class="circle outer"></div>
                <div class="circle middle"></div>
                <div class="circle inner"></div>
                <div class="scanning-dot"></div>
            </div>
            <div class="globe-container">
                <div class="globe"></div>
                <div class="globe-overlay"></div>
            </div>
        </div>
    </div>

    <div class="welcome-message">
        <h1 class="cyber-text">> AVA SYSTEM ONLINE</h1>
        <p class="typing-text">Welcome back, Mr. Afsah. How may I assist you today?</p>
        <div class="ai-status">
            <span class="status-indicator active"></span>
            AVA Core: Active | Systems: Optimal
        </div>
    </div>

    <div class="corner-cards">
        <div class="card top-left">
            <div class="card-header">
                <h3><span class="ai-icon pulse-icon">⚡</span> SYSTEM STATUS</h3>
                <div class="real-time-indicator"></div>
            </div>
            <div class="card-content">
                <div class="system-monitor">
                    <div class="monitor-item">
                        <div class="label">CPU Load</div>
                        <div class="dynamic-bar">
                            <div class="bar-fill cpu-load" data-min="30" data-max="80"></div>
                        </div>
                    </div>
                    <div class="monitor-item">
                        <div class="label">Memory</div>
                        <div class="dynamic-bar">
                            <div class="bar-fill memory-load"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card top-right">
            <h3><span class="ai-icon">📊</span> ANALYTICS</h3>
            <div class="card-content">
                <div class="project-item active">
                    <span class="status-dot"></span>
                    Research Progress
                    <div class="project-progress">85%</div>
                </div>
                <div class="project-item">
                    <span class="status-dot"></span>
                    Next Milestone: 2 days
                </div>
            </div>
        </div>

        <div class="card bottom-right">
            <h3><span class="ai-icon">🤖</h3>
            <div class="card-content">
                <div class="ai-function interactive">
                    <span class="icon">🔮</span>
                    Assist Mode
                </div>
                <div class="voice-interface">
                    <button class="voice-btn">
                        <span class="pulse"></span>
                        Voice Interface
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="globe-container" class="interactive"></div>

    <div class="audio-visualizer">
        <canvas id="visualizer"></canvas>
    </div>

    <div class="chat-interface">
        <div class="ai-response" id="aiResponse">
            <span class="response-text">I'm here to help, Mr. Afsah. What can I do for you?</span>
            <div class="response-visualizer"></div>
        </div>
        <div class="search-container">
            <div class="search-prefix">> AVA://</div>
            <input type="text" class="search-bar" placeholder="How can I assist you, Mr. Afsah?">
            <button class="voice-trigger" title="Activate voice input">
                <div class="voice-wave"></div>
            </button>
        </div>
    </div>

    <script src="particles-config.js"></script>
    <script src="animations.js"></script>
    <script src="main.js"></script>
</body>
</html>
