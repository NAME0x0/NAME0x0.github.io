<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Dashboard</title>
    <style>
        /* Loader Styles */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }

        .loader {
            display: flex;
            align-items: center;
            margin-left: -0.65em;
        }

        .load1, .load2, .load3, .load4, .load5, .load6, .load7, .load8, .load9 {
            position: absolute;
            content: "";
            margin-right: 1em;
            height: 1.2em;
            width: 1.2em;
            border-radius: 5px;
            background-color: white;
            box-shadow: 0 1px 7px rgba(0,0,0,0.3);
        }

        .load2 { animation: 2s flow2 infinite; }
        .load3 { animation: 2s flow3 infinite; }
        .load4 { animation: 2s flow4 infinite; }
        .load5 { animation: 2s flow5 infinite; }
        .load6 { animation: 6s flow6 infinite; }
        .load7 { animation: 6s flow7 infinite; }
        .load8 { animation: 6s flow8 infinite; }
        .load9 { animation: 6s flow9 infinite; }

        @keyframes flow2 {
            50% {
                transform: translateX(3em);
                box-shadow: 0 1px 7px rgba(0,0,0,0.3);
            }
            100% {
                transform: translateX(0em);
            }
        }

        @keyframes flow3 {
            50% {
                transform: translateX(-3em);
                box-shadow: 0 1px 7px rgba(0,0,0,0.3);
            }
            100% {
                transform: translateX(0em);
            }
        }

        @keyframes flow4 {
            50% {
                transform: translateY(3em);
                box-shadow: 0 1px 7px rgba(0,0,0,0.3);
            }
            100% {
                transform: translateY(0em);
            }
        }

        @keyframes flow5 {
            50% {
                transform: translateY(-3em);
                box-shadow: 0 1px 7px rgba(0,0,0,0.3);
            }
            100% {
                transform: translateY(0em);
            }
        }

        @keyframes flow6 {
            30% {
                transform: translateX(3em);
                box-shadow: 0 1px 7px rgba(0,0,0,0.3);
            }
            60% {
                transform: translateX(3em) translateY(-3em);
                box-shadow: 0 1px 7px rgba(0,0,0,0.3);
            }
            100% {
                transform: translateX(0em) translateY(0em);
            }
        }

        @keyframes flow7 {
            30% {
                transform: translateX(-3em);
                box-shadow: 0 1px 7px rgba(0,0,0,0.3);
            }
            60% {
                transform: translateX(-3em) translateY(3em);
                box-shadow: 0 1px 7px rgba(0,0,0,0.3);
            }
            100% {
                transform: translateX(0em) translateY(0em);
            }
        }

        @keyframes flow8 {
            30% {
                transform: translateY(3em);
                box-shadow: 0 1px 7px rgba(0,0,0,0.3);
            }
            60% {
                transform: translateY(3em) translateX(3em);
                box-shadow: 0 1px 7px rgba(0,0,0,0.3);
            }
            100% {
                transform: translateX(0em) translateY(0em);
            }
        }

        @keyframes flow9 {
            30% {
                transform: translateY(-3em);
                box-shadow: 0 1px 7px rgba(0,0,0,0.3);
            }
            60% {
                transform: translateY(-3em) translateX(-3em);
                box-shadow: 0 1px 7px rgba(0,0,0,0.3);
            }
            100% {
                transform: translateX(0em) translateY(0em);
            }
        }

        /* Dashboard Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: #1a1a1a;
            color: white;
        }

        .welcome-container {
            text-align: center;
            padding: 2rem;
        }

        .corner-container {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .corner-card {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1.5rem;
            width: 250px;
            pointer-events: auto;
        }

        .top-left { top: 20px; left: 20px; }
        .top-right { top: 20px; right: 20px; }
        .bottom-left { bottom: 20px; left: 20px; }
        .bottom-right { bottom: 20px; right: 20px; }

        .card-title {
            margin: 0 0 1rem 0;
            font-size: 1.2rem;
        }

        .link-item {
            display: block;
            color: white;
            text-decoration: none;
            margin: 0.5rem 0;
            transition: opacity 0.3s;
        }

        .link-item:hover {
            opacity: 0.8;
        }

        .search-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            cursor: pointer;
        }

        #main-content {
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }
    </style>
</head>
<body>
    <!-- Loader -->
    <div id="loader-wrapper">
        <div class="loader">
            <div class="load1"></div>
            <div class="load2"></div>
            <div class="load3"></div>
            <div class="load4"></div>
            <div class="load5"></div>
            <div class="load6"></div>
            <div class="load7"></div>
            <div class="load8"></div>
            <div class="load9"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <div class="welcome-container">
            <div id="welcome-text" class="welcome-text"></div>
            <div id="assist-text" class="assist-text"></div>
        </div>

        <div class="corner-container">
            <div class="corner-card top-left">
                <h3 id="personal-hub" class="card-title">🌐 Personal Hub</h3>
                <div class="card-content">
                    <a href="#" class="link-item">👨‍💻 GitHub</a>
                    <a href="#" class="link-item">💼 LinkedIn</a>
                    <a href="#" class="link-item">📸 Instagram</a>
                </div>
            </div>

            <div class="corner-card top-right">
                <h3 id="projects" class="card-title">💡 Projects</h3>
                <div class="card-content">
                    <div class="link-item">🤖 AVA - AI Assistant</div>
                    <div class="link-item">🚀 Portfolio Website</div>
                </div>
            </div>

            <div class="corner-card bottom-left">
                <h3 id="learning" class="card-title">📚 Learning</h3>
                <div class="card-content">
                    <a href="#" class="link-item">🎓 Coursera</a>
                    <a href="#" class="link-item">💻 LeetCode</a>
                    <a href="#" class="link-item">📝 Documentation</a>
                </div>
            </div>

            <div class="corner-card bottom-right">
                <h3 id="tools" class="card-title">🛠️ Tools</h3>
                <div class="card-content">
                    <div class="link-item">⛅ Weather: 22°C Clear</div>
                    <div class="link-item">📅 Calendar</div>
                    <div class="link-item">✅ Tasks</div>
                </div>
            </div>
        </div>

        <div class="search-container">
            <div class="search-bar">🔍</div>
        </div>
    </div>

    <script>
        // Hide loader and show content after page loads
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader-wrapper');
                const content = document.getElementById('main-content');
                
                // Fade out loader
                loader.style.opacity = '0';
                
                // Show content
                content.style.opacity = '1';
                
                // Remove loader after fade out
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }, 2000); // Show loader for 2 seconds
        });
    </script>
</body>
</html>
