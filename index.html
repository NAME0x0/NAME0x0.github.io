<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA | AI Assistant</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="logo">AVA Core</div>
            <div class="status">System Online</div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- AI Visualization -->
            <div class="ai-core">
                <canvas id="ai-face"></canvas>
                <div class="ai-rings"></div>
            </div>

            <!-- Widgets -->
            <div class="widgets left">
                <div class="widget" id="time-widget">
                    <h3>Local Time</h3>
                    <div class="time">--:--</div>
                    <div class="date">Loading...</div>
                </div>

                <div class="widget" id="tasks-widget">
                    <h3>Tasks</h3>
                    <div class="tasks-list"></div>
                    <button class="add-task">+ Add Task</button>
                </div>
            </div>

            <div class="widgets right">
                <div class="widget" id="system-widget">
                    <h3>System Status</h3>
                    <div class="metrics"></div>
                </div>

                <div class="widget" id="notes-widget">
                    <h3>Quick Notes</h3>
                    <div class="notes-list"></div>
                    <button class="add-note">+ Add Note</button>
                </div>
            </div>

            <!-- Command Input -->
            <div class="command-input">
                <input type="text" placeholder="Ask AVA...">
                <button class="voice-input">
                    <span class="mic-icon">🎤</span>
                </button>
            </div>
        </main>
    </div>

    <script src="js/animations.js"></script>
    <script src="js/widgets.js"></script>
    <script src="js/ava-core.js"></script>
</body>
</html>
