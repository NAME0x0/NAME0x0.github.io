<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <title>Muhammad Afsah Mumtaz</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <!-- Preloader Section -->
  <div class="preloader">
    <div class="video-container">
      <video id="preloaderVideo" autoplay muted playsinline>
        <source src="https://example.com/placeholder-video.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

  <!-- Main Content -->
  <div class="dashboard">
    <!-- Hero Section -->
    <header class="hero">
      <div class="hero-content">
        <img src="https://example.com/profile-image.jpg" alt="Profile Image" class="profile-image">
        <h1>Muhammad Afsah Mumtaz</h1>
        <p>Innovating for a brighter future in IT and AI Development.</p>
      </div>
    </header>

    <!-- Quick Links Section -->
    <section class="links">
      <h2>Quick Links</h2>
      <ul>
        <li><a href="https://github.com/NAME0x0" target="_blank">GitHub</a></li>
        <li><a href="https://blueskyweb.xyz" target="_blank">Bluesky</a></li>
        <li><a href="https://www.linkedin.com/in/afsah" target="_blank">LinkedIn</a></li>
      </ul>
    </section>

    <!-- Audio Player Section -->
    <section class="audio">
      <h2>Now Playing</h2>
      <div id="audioPlayer">
        <span class="track-title">Ambient Sounds</span> by <span class="track-artist">Afsah</span>
        <button id="playPause">Play</button>
      </div>
    </section>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2024 Muhammad Afsah Mumtaz. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
