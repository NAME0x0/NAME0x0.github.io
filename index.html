<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA | Personal AI Assistant</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap">
</head>
<body>
    <!-- Background Elements -->
    <div class="matrix-rain"></div>
    <div class="grid-overlay"></div>
    <div class="glow-effects"></div>

    <!-- Main Dashboard -->
    <div class="dashboard-container">
        <!-- Left Sidebar -->
        <aside class="sidebar left-sidebar">
            <div class="widget time-weather">
                <div class="time-display">
                    <div class="current-time">00:00</div>
                    <div class="date">Loading...</div>
                </div>
                <div class="weather-display">
                    <div class="temperature">--°C</div>
                    <div class="weather-desc">Dubai, UAE</div>
                    <div class="weather-details">
                        <span class="humidity">Humidity: --%</span>
                        <span class="wind">Wind: -- km/h</span>
                    </div>
                </div>
            </div>
            
            <div class="widget tasks">
                <div class="widget-header">
                    <h3>Tasks</h3>
                </div>
                <div class="widget-content">
                    <div class="task-list"></div>
                    <button class="add-task-btn">+ Add Task</button>
                </div>
            </div>
        </aside>

        <!-- Central Content -->
        <main class="main-content">
            <div class="ai-presence">
                <canvas id="ava-visualization"></canvas>
                <div class="ai-aura"></div>
                <div class="ai-status-ring"></div>
            </div>

            <div class="user-input-area">
                <input type="text" class="command-input" 
                       placeholder="Ask AVA anything..." 
                       autocomplete="off">
                <button class="voice-input-btn" title="Activate voice input">
                    <div class="voice-indicator"></div>
                </button>
            </div>
        </main>

        <!-- Right Sidebar -->
        <aside class="sidebar right-sidebar">
            <div class="widget notes">
                <h3>Quick Notes</h3>
                <div class="notes-list">
                    <!-- Notes will be populated here -->
                </div>
                <button class="add-note-btn">+ New Note</button>
            </div>

            <div class="widget system-status">
                <h3>System Status</h3>
                <div class="status-metrics">
                    <div class="metric cpu">
                        <label>CPU</label>
                        <div class="metric-bar"></div>
                    </div>
                    <div class="metric memory">
                        <label>Memory</label>
                        <div class="metric-bar"></div>
                    </div>
                    <div class="metric network">
                        <label>Network</label>
                        <div class="metric-bar"></div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/ava-core.js"></script>
    <script src="js/widgets.js"></script>
    <script src="js/animations.js"></script>
</body>
</html>
