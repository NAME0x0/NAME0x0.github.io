<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard">
    <header class="header">
      <h1>Welcome, Mr. Afsah</h1>
      <p>Your personal dashboard</p>
    </header>

    <div class="content">
      <div class="tile tools">
        <h2>Productivity Tools</h2>
        <p>Quick access to apps and tools</p>
        <button>Open</button>
      </div>

      <div class="tile bookmarks">
        <h2>Bookmarks</h2>
        <ul>
          <li><a href="https://github.com/NAME0x0">GitHub</a></li>
          <li><a href="https://blueskyweb.xyz">Bluesky</a></li>
          <li><a href="https://uiverse.io">UIverse</a></li>
        </ul>
      </div>

      <div class="tile recent">
        <h2>Recent Activities</h2>
        <p>No new updates</p>
      </div>

      <div class="tile widgets">
        <h2>Custom Widgets</h2>
        <p>Coming soon...</p>
      </div>
    </div>

    <footer class="footer">
      <p>&copy; 2024 Mr. Afsah's Dashboard</p>
    </footer>
  </div>
</body>
</html>
