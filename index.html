<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA Interface</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div id="ava-container">
        <!-- Background Elements -->
        <div class="background-layer"></div>
        <div class="grid-overlay"></div>
        <div class="scan-line"></div>

        <!-- Main Interface -->
        <header class="main-header">
            <div class="ava-status">
                <div class="status-indicator"></div>
                <span class="status-text">AVA CORE v1.0</span>
            </div>
            <nav class="main-nav">
                <button class="nav-btn" data-view="terminal">Terminal</button>
                <button class="nav-btn" data-view="dashboard">Dashboard</button>
                <button class="nav-btn" data-view="analytics">Analytics</button>
            </nav>
        </header>

        <!-- Widget Container -->
        <div class="widget-container">
            <div class="widget" id="system-monitor">
                <div class="widget-header">
                    <span>System Monitor</span>
                    <div class="widget-controls"></div>
                </div>
                <div class="widget-content">
                    <div class="metric" id="cpu-usage"></div>
                    <div class="metric" id="memory-usage"></div>
                    <div class="metric" id="network-status"></div>
                </div>
            </div>
        </div>

        <!-- Terminal Interface -->
        <div class="terminal-container">
            <div class="terminal-header">
                <span>AVA Terminal</span>
                <div class="terminal-controls"></div>
            </div>
            <div class="terminal-content">
                <div class="terminal-output"></div>
                <div class="terminal-input-line">
                    <span class="prompt">ava://$</span>
                    <input type="text" class="terminal-input" autofocus title="Terminal command input" placeholder="Enter command...">
                </div>
            </div>
        </div>

        <!-- Voice Interface -->
        <div class="voice-interface">
            <button class="voice-trigger" title="Activate Voice Interface">
                <div class="voice-indicator"></div>
            </button>
        </div>
    </div>

    <script src="js/widgets.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/terminal.js"></script>
    <script src="js/ava-core.js"></script>
</body>
</html>
