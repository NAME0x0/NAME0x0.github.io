<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA AI Assistant</title>
    <link rel="stylesheet" href="main.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script src="js/weather-time.js" defer></script>
    <script src="js/calendar.js" defer></script>
    <script src="js/ai-interface.js" defer></script>
    <script src="js/widget-system.js" defer></script>
    <meta name="description" content="AVA Dashboard">
    <link rel="manifest" href="manifest.json">
    <meta name="msapplication-navbutton-color" content="#020c1b">
    <meta name="apple-mobile-web-app-status-bar-style" content="#020c1b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/icon-192x192.png">
</head>
<body>
    <div class="background-loaders">
        <div class="loader-circle loader-1"></div>
        <div class="loader-circle loader-2"></div>
        <div class="loader-circle loader-3"></div>
        <div class="loader-circle loader-4"></div>
    </div>
    <div id="particles-js" class="matrix-bg"></div>
    <div class="background-circles">
        <div class="bg-circle circle-1"></div>
        <div class="bg-circle circle-2"></div>
        <div class="bg-circle circle-3"></div>
        <div class="bg-circle circle-4"></div>
        <div class="bg-circle circle-5"></div>
    </div>
    <div class="dynamic-overlay"></div>
    
    <!-- Header -->
    <div class="welcome-message">
        <h1 class="cyber-text">> AVA SYSTEM ONLINE</h1>
        <p class="typing-text">Welcome back, Mr. Afsah. How may I assist you today?</p>
        <div class="ai-status">
            <span class="status-indicator active"></span>
            AVA Core: Active | Systems: Optimal
        </div>
    </div>

    <!-- Left Widgets -->
    <div class="widget-dock left">
        <button class="widget-trigger" data-widget-trigger="weather" title="Weather & Time" type="button">
            <span class="widget-icon">🌍</span>
        </button>
        <button class="widget-trigger" data-widget-trigger="calendar" title="Calendar" type="button">
            <span class="widget-icon">📅</span>
        </button>
        <button class="widget-trigger" data-widget-trigger="system" title="System Status" type="button">
            <span class="widget-icon">⚡</span>
        </button>
    </div>

    <div class="widget-container left">
        <div class="widget" data-widget="weather">
            <!-- Copy your weather widget content here -->
            <div class="widget-content">
                <div class="time-display">
                    <!-- ... weather content ... -->
                </div>
            </div>
        </div>
        <div class="widget" data-widget="calendar">
            <!-- Calendar widget content -->
        </div>
        <div class="widget" data-widget="system">
            <!-- System widget content -->
        </div>
    </div>

    <!-- Right Widgets -->
    <div class="widget-dock right">
        <button class="widget-trigger" data-widget-trigger="ai" title="AI Controls">
            🤖
        </button>
    </div>

    <div class="widget-container right">
        <div class="widget" data-widget="ai">
            <!-- AI controls content -->
        </div>
    </div>

    <!-- Center Content -->
    <main class="center-content" role="main">
        <div class="ai-presence">
            <div class="loader-container">
                <div class="circle-loader">
                    <div class="circle outer"></div>
                    <div class="circle middle"></div>
                    <div class="circle inner"></div>
                    <div class="scanning-dot"></div>
                </div>
                <div class="globe-container">
                    <div class="globe"></div>
                    <div class="globe-overlay"></div>
                </div>
            </div>
        </div>
        <div class="quick-actions">
            <button class="action-btn" aria-label="Create New Task">
                <span class="icon">📝</span> New Task
            </button>
            <button class="action-btn" aria-label="System Analysis">
                <span class="icon">📊</span> Analysis
            </button>
            <button class="action-btn" aria-label="Settings">
                <span class="icon">⚙️</span> Settings
            </button>
        </div>
        <div class="system-overview">
            <h2 class="section-title">System Overview</h2>
            <div class="overview-grid">
                <!-- Add system stats here -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div class="chat-interface" role="complementary">
        <div class="ai-response" id="aiResponse">
            <span class="response-text">I'm here to help, Mr. Afsah. What can I do for you?</span>
            <div class="response-visualizer"></div>
        </div>
        <div class="search-container">
            <div class="search-prefix">> AVA://</div>
            <input type="text" class="search-bar" placeholder="How can I assist you, Mr. Afsah?">
            <button class="voice-trigger" title="Activate voice input">
                <div class="voice-wave"></div>
            </button>
        </div>
        <div class="chat-actions">
            <button class="action-btn" aria-label="Clear Chat">
                <span class="icon">🗑️</span>
            </button>
            <button class="action-btn" aria-label="Save Chat">
                <span class="icon">💾</span>
            </button>
        </div>
    </div>

    <!-- Keyboard Shortcut Overlay -->
    <div class="shortcut-overlay">
        <div class="shortcut-grid">
            <div class="shortcut-category">
                <h3>Navigation</h3>
                <div class="shortcut-item">
                    <kbd>?</kbd> Show/Hide Shortcuts
                </div>
                <div class="shortcut-item">
                    <kbd>ESC</kbd> Close Overlay
                </div>
                <!-- Add more shortcuts -->
            </div>
        </div>
    </div>

    <script src="particles-config.js"></script>
    <script src="animations.js"></script>
    <script src="main.js"></script>
    <script src="js/widget-system.js" defer></script>
    <script>
    document.addEventListener('keydown', (e) => {
        if (e.key === '?' && e.shiftKey) {
            document.querySelector('.shortcut-overlay').classList.toggle('visible');
        }
        if (e.key === 'Escape') {
            document.querySelector('.shortcut-overlay').classList.remove('visible');
        }
    });
    </script>
</body>
</html>
