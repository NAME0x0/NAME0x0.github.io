<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA | AI Assistant</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap">
</head>
<body>
    <div class="background-effects">
        <div class="matrix-rain"></div>
        <div class="grid-overlay"></div>
        <div class="glow-effects"></div>
    </div>

    <div class="ava-interface">
        <header class="main-header">
            <div class="logo">
                <span class="status-indicator active"></span>
                AVA Interface v1.0
            </div>
            <div class="system-status">System Status: Online</div>
        </header>

        <div class="dashboard-layout">
            <aside class="side-panel left-panel">
                <div class="widget" id="datetime-widget">
                    <div class="widget-header">
                        <span class="widget-icon">⏰</span>
                        Temporal Data
                    </div>
                    <div class="widget-content">
                        <div class="time">00:00</div>
                        <div class="date">Loading...</div>
                        <div class="weather">Loading weather data...</div>
                    </div>
                </div>
                <!-- More left panel widgets -->
            </aside>

            <main class="ai-presence">
                <div class="ai-core-interface">
                    <div class="ai-visual-container">
                        <canvas id="ai-head"></canvas>
                        <div class="ai-aura"></div>
                        <div class="hologram-effect"></div>
                    </div>
                </div>
                <div class="command-interface">
                    <div class="command-wrapper">
                        <input type="text" placeholder="Communicate with AVA..." />
                        <button class="voice-trigger">🎤</button>
                    </div>
                </div>
            </main>

            <aside class="side-panel right-panel">
                <div class="widget" id="system-metrics">
                    <!-- System metrics widget content -->
                </div>
                <!-- More right panel widgets -->
            </aside>
        </div>
    </div>

    <script src="js/animations.js"></script>
    <script src="js/widgets.js"></script>
    <script src="js/ava-core.js"></script>
</body>
</html>
