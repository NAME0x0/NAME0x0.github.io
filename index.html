<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA</title>
    <link rel="stylesheet" href="https://codepen.io/FlyingEmu/pen/cjBzr.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
</head>
<body onload="AVAStartingReply()">
    <div class="scroll">
        <!-- Left Panel with exact metrics -->
        <div id="leftmenu">
            <div id="date_time">
                <div id="date" class="semi_arc e4">
                    <div class="semi_arc_2 e4_1">
                        <div class="counterspin4"></div>
                    </div>
                    <div style="font-size: 40px; margin-top: 25px" id="dateValue"></div>
                    <div style="font-size: 25px" id="monthValue"></div>
                </div>

                <div id="time" class="arc e1">
                    <div style="font-size: 23px; margin-left: -10px; margin-top: 23px" id="timeValue"></div>
                    <div style="font-size: 17px; margin-top: 10px" id="weekDayValue"></div>
                </div>
            </div>

            <p class="title">Performance</p>
            <div class="hline title_underline"></div>

            <span class="menuitem entypo-gauge" style="font-size: 30px; margin-left: 10px">
                <p id="cpu" class="caption" style="font-size: 20px">CPU Usage: 19%</p>
            </span>
            <br>
            <span class="menuitem entypo-chart-area" style="font-size: 30px; margin-left: 10px">
                <p id="ram" class="caption" style="font-size: 20px"></p>
            </span>
            <br>
            <span class="menuitem entypo-chart-pie" style="font-size: 30px; margin-left: 10px">
                <p id="proc" class="caption" style="font-size: 20px">Processes: 73</p>
            </span>

            <p class="title">Social</p>
            <div class="hline title_underline"></div>

            <div class="app_icon entypo-facebook-squared"></div>
            <div class="app_icon entypo-twitter"></div>
            <div class="app_icon entypo-gplus"></div>
            <div class="app_icon entypo-skype"></div>
        </div>

        <!-- Center Arc Reactor -->
        <button id="microphoneButton" title="Activate Voice Control">
            <div id="arc_container">
                <div class="arc_reactor">
                    <div class="case_container">
                        <div class="e7">
                            <div class="semi_arc_3 e5_1">
                                <div class="semi_arc_3 e5_2">
                                    <div class="semi_arc_3 e5_3">
                                        <div class="semi_arc_3 e5_4" id="mainCircle"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="core2"></div>
                        </div>
                        <ul class="marks"></ul>
                    </div>
                </div>
            </div>
        </button>

        <!-- Right Panel with Notes and Weather -->
        <div id="rightmenu">
            <p class="title" style="text-align: left; margin-left: 10px">Notes</p>
            <div id="particle10" class="hline"></div>
            <div id="particle11" class="hline"></div>
            <div id="particle12" class="vline"></div>
            <textarea id="note_input" rows="12" cols="44" title="Notes input area">For the maximum viewing experience...</textarea>
            
            <div id="temperature">
                <div id="date_time">
                    <div id="date" class="semi_arc e4">
                        <div class="semi_arc_2 e4_1">
                            <div class="counterspin4"></div>
                        </div>
                        <div style="font-size: 34px; margin-top: 25px" id="tempValue"></div>
                        <div style="font-size: 30px"><sup>0</sup>c</div>
                        <div style="font-size: 25px">Temp.</div>
                    </div>

                    <div id="time" class="arc e1">
                        <div style="font-size: 23px; margin-right: 8px; margin-top: 23px" id="humidityValue"></div>
                        <div style="font-size: 17px; margin-top: 10px">Humidity</div>
                    </div>
                </div>
            </div>
            <div id="time1" class="arc e1">
                <div id="weatherImage"></div>
            </div>
        </div>

        <!-- Particle Effects -->
        <canvas id="particle1" width="20" height="500"></canvas>
        <canvas id="particle1_1" width="40" height="510"></canvas>
        <canvas id="particle1_2" width="40" height="510"></canvas>
        <div id="particle2">▶<br>▶<br>▶</div>
        <div id="particle3" class="vline"></div>
        <div id="particle4" class="vline"></div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
