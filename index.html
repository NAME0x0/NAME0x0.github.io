<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Personal Interface</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --primary: #0a192f;
            --secondary: #020c1b;
            --accent: #64ffda;
            --text: #8892b0;
            --hover: #112240;
            --neon: #00bfff;
            --hologram: rgba(100, 255, 218, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: var(--secondary);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .welcome-container {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        .welcome-text {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
            font-family: 'Orbitron', sans-serif;
        }

        .assist-text {
            font-size: 1.2rem;
            color: var(--text);
            opacity: 0.8;
        }

        /* Grid Layout for Corner Cards */
        .corner-container {
            position: fixed;
            width: 100vw;
            height: 100vh;
            pointer-events: none; /* Allow clicks to pass through to elements below */
        }

        .corner-card {
            position: absolute;
            width: 300px;
            height: 250px;
            background: var(--hologram);
            border: 1px solid var(--accent);
            border-radius: 15px;
            padding: 1.5rem;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            pointer-events: auto; /* Re-enable clicking for cards */
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.1);
            animation: hologramPulse 2s infinite;
        }

        .corner-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scanline 2s linear infinite;
        }

        .corner-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        /* Corner Positioning */
        .top-left {
            top: 2rem;
            left: 2rem;
        }

        .top-right {
            top: 2rem;
            right: 2rem;
        }

        .bottom-left {
            bottom: 2rem;
            left: 2rem;
        }

        .bottom-right {
            bottom: 2rem;
            right: 2rem;
        }

        .card-title {
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-content {
            opacity: 0.9;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0;
            color: var(--text);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .link-item:hover {
            color: var(--accent);
            transform: translateX(5px);
        }

        /* Center Globe */
        .hero {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
        }

        #globe-container {
            width: 100%;
            height: 100%;
        }

        /* Search Bar */
        .search-container {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            z-index: 10;
        }

        .search-bar {
            background: var(--hologram);
            border: 2px solid var(--accent);
            padding: 1rem 1.5rem;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 1rem;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            animation: scanline 2s linear infinite;
        }

        .search-bar input {
            background: none;
            border: none;
            color: var(--text);
            width: 100%;
            font-size: 1rem;
            outline: none;
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Animations */
        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 5px var(--accent); }
            50% { box-shadow: 0 0 20px var(--accent); }
            100% { box-shadow: 0 0 5px var(--accent); }
        }

        @keyframes hologramPulse {
            0% { box-shadow: 0 0 20px rgba(100, 255, 218, 0.1); }
            50% { box-shadow: 0 0 30px rgba(100, 255, 218, 0.2); }
            100% { box-shadow: 0 0 20px rgba(100, 255, 218, 0.1); }
        }

        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background-color: var(--accent);
            margin-left: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Add new scanning animation */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--accent);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .corner-card {
                width: calc(50% - 3rem);
                height: auto;
                min-height: 200px;
            }

            .search-container {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>
    <div class="welcome-container">
        <div class="welcome-text" id="welcome-text"></div>
        <div class="assist-text" id="assist-text"></div>
    </div>

    <div class="corner-container">
        <!-- System Status -->
        <div class="corner-card top-left">
            <h3 class="card-title">🔬 System Status</h3>
            <div class="card-content">
                <div class="link-item">
                    <span>💻</span>
                    <span>CPU: 32% Utilized</span>
                </div>
                <div class="link-item">
                    <span>🔋</span>
                    <span>Power: 97% Available</span>
                </div>
                <div class="link-item">
                    <span>📡</span>
                    <span>Network: Connected</span>
                </div>
            </div>
        </div>

        <!-- Project Showcase -->
        <div class="corner-card top-right">
            <h3 class="card-title">💡 Projects</h3>
            <div class="card-content">
                <div class="link-item">
                    <span>🤖</span>
                    <span>AVA - AI Assistant</span>
                </div>
                <div class="link-item">
                    <span>🚀</span>
                    <span>Portfolio Website</span>
                </div>
            </div>
        </div>

        <!-- Learning Dashboard -->
        <div class="corner-card bottom-left">
            <h3 class="card-title">📚 Learning</h3>
            <div class="card-content">
                <a href="#" class="link-item">
                    <span>🎓</span>
                    <span>Coursera</span>
                </a>
                <a href="#" class="link-item">
                    <span>💻</span>
                    <span>LeetCode</span>
                </a>
                <a href="#" class="link-item">
                    <span>📝</span>
                    <span>Documentation</span>
                </a>
            </div>
        </div>

        <!-- Daily Tools -->
        <div class="corner-card bottom-right">
            <h3 class="card-title">🛠️ Tools</h3>
            <div class="card-content">
                <div class="link-item">
                    <span>⛅</span>
                    <span>Weather: 22°C Clear</span>
                </div>
                <div class="link-item">
                    <span>📅</span>
                    <span>Calendar</span>
                </div>
                <div class="link-item">
                    <span>✅</span>
                    <span>Tasks</span>
                </div>
            </div>
        </div>
    </div>

    <div class="hero">
        <div id="globe-container"></div>
    </div>

    <div class="search-container">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" placeholder="How can I assist you today?">
        </div>
    </div>

    <script>
        // Typing Animation for Welcome Message
        const welcomeText = document.getElementById('welcome-text');
        const assistText = document.getElementById('assist-text');
        
        function typeWriter(element, text, speed = 50) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerHTML = text.substring(0, i + 1) + '<span class="typing-cursor"></span>';
                    i++;
                    setTimeout(type, speed);
                } else {
                    element.innerHTML = text;
                    if (element === welcomeText) {
                        typeWriter(assistText, "How can I assist you today?", 50);
                    }
                }
            }
            type();
        }

        // Start typing animation
        typeWriter(welcomeText, "Welcome back, Sir. All systems operational.");

        // Initialize Three.js Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        const container = document.getElementById('globe-container');
        renderer.setSize(400, 400);
        container.appendChild(renderer.domElement);

        // Create sphere geometry with more complex structure
        const geometry = new THREE.SphereGeometry(5, 32, 32);
        const material = new THREE.MeshPhongMaterial({
            color: 0x00ffff,
            wireframe: true,
            transparent: true,
            opacity: 0.8
        });
        const sphere = new THREE.Mesh(geometry, material);
        
        // Add outer sphere
        const outerGeometry = new THREE.SphereGeometry(6, 32, 32);
        const outerMaterial = new THREE.MeshPhongMaterial({
            color: 0x7b68ee,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const outerSphere = new THREE.Mesh(outerGeometry, outerMaterial);
        
        scene.add(sphere);
        scene.add(outerSphere);

        // Add lights
        const light = new THREE.PointLight(0x00ffff, 1, 100);
        light.position.set(10, 10, 10);
        scene.add(light);

        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        camera.position.z = 15;

        // Animation loop with more complex rotation
        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.x += 0.005;
            sphere.rotation.y += 0.007;
            outerSphere.rotation.x -= 0.003;
            outerSphere.rotation.y -= 0.005;
            renderer.render(scene, camera);
        }
        animate();

        // Search Functionality
        const searchInput = document.querySelector('.search-bar input');
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.corner-card');
            
            cards.forEach(card => {
                const content = card.textContent.toLowerCase();
                if (searchTerm === '') {
                    card.style.opacity = '1';
                } else if (content.includes(searchTerm)) {
                    card.style.opacity = '1';
                    card.style.animation = 'pulse 2s infinite';
                } else {
                    card.style.opacity = '0.3';
                    card.style.animation = 'none';
                }
            });
        });
    </script>
</body>
</html>
