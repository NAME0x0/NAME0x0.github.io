<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA Interface</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
</head>
<body>
    <div class="interface-container">
        <!-- Left Panel -->
        <section class="side-panel left">
            <div class="datetime-module">
                <div class="date-display semi-arc">
                    <div class="inner-ring rotating"></div>
                    <div class="date-value"></div>
                </div>
                <div class="time-display arc">
                    <div class="time-value"></div>
                </div>
            </div>

            <div class="system-metrics">
                <h2 class="panel-title">System Status</h2>
                <div class="metrics-grid"></div>
            </div>
        </section>

        <!-- Center Display -->
        <main class="main-display">
            <div class="arc-reactor">
                <div class="reactor-core">
                    <div class="core-inner"></div>
                    <div class="core-outer"></div>
                    <div class="core-spokes"></div>
                </div>
            </div>

            <div class="command-interface">
                <div class="cmd-input">
                    <span class="prompt">></span>
                    <input type="text" id="cmd-input" placeholder="Enter command...">
                    <button class="voice-trigger" title="Activate voice command">
                        <span class="voice-icon"></span>
                    </button>
                </div>
                <div class="response-display"></div>
            </div>
        </main>

        <!-- Right Panel -->
        <section class="side-panel right">
            <div class="analytics-module">
                <h2 class="panel-title">Analytics</h2>
                <canvas id="system-analytics"></canvas>
            </div>
            
            <div class="environment-module">
                <div class="temp-display semi-arc">
                    <div class="temp-value"></div>
                </div>
                <div class="humid-display arc">
                    <div class="humid-value"></div>
                </div>
            </div>
        </section>
    </div>

    <!-- Particle Effects -->
    <div class="particle-container">
        <canvas id="matrix-rain"></canvas>
        <div class="scan-lines"></div>
        <div class="grid-overlay"></div>
    </div>

    <script src="js/animations.js"></script>
    <script src="js/widgets.js"></script>
    <script src="js/ava-core.js"></script>
</body>
</html>
